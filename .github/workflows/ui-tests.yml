name: UI Tests

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'JUnit5 tags expression, e.g. smoke, cart, smoke&cart'
        required: false
        default: 'smoke'
        type: string

      excluded_tags:
        description: 'Tags to exclude, e.g. flaky or e2e'
        required: false
        default: ''
        type: string

      browser:
        description: 'Playwright browser'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

      update_baseline:
        description: 'Update visual baseline'
        required: false
        default: false
        type: boolean

      test_name:
        description: 'Optional single test: SmokeSearchTest or SmokeSearchTest#search_returnsResults'
        required: false
        default: ''
        type: string

  schedule:
    - cron: '0 6 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      DEMO_USER_EMAIL: ${{ secrets.DEMO_USER_EMAIL }}
      DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}

      DEFAULT_TAGS: smoke
      DEFAULT_EXCLUDED_TAGS: ""
      DEFAULT_BROWSER: chromium

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Install Playwright browsers and Linux dependencies
        run: |
          mvn -q exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Prepare run label
        id: meta
        shell: bash
        run: |
          TEST_NAME="${{ github.event.inputs.test_name }}"
          if [ -n "$TEST_NAME" ]; then
            SAFE_NAME=$(echo "$TEST_NAME" | sed 's/#/-/g; s/[^A-Za-z0-9._-]/_/g')
            echo "artifact_suffix=single-$SAFE_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_suffix=smoke-suite" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: |
          TAGS="${{ github.event.inputs.tags }}"
          EXCLUDED_TAGS="${{ github.event.inputs.excluded_tags }}"
          BROWSER="${{ github.event.inputs.browser }}"
          UPDATE_BASELINE="${{ github.event.inputs.update_baseline }}"
          TEST_NAME="${{ github.event.inputs.test_name }}"

          if [ -z "$TAGS" ]; then TAGS="$DEFAULT_TAGS"; fi
          if [ -z "$EXCLUDED_TAGS" ]; then EXCLUDED_TAGS="$DEFAULT_EXCLUDED_TAGS"; fi
          if [ -z "$BROWSER" ]; then BROWSER="$DEFAULT_BROWSER"; fi
          if [ -z "$UPDATE_BASELINE" ]; then UPDATE_BASELINE="false"; fi

          echo "TAGS=$TAGS"
          echo "EXCLUDED_TAGS=$EXCLUDED_TAGS"
          echo "BROWSER=$BROWSER"
          echo "UPDATE_BASELINE=$UPDATE_BASELINE"
          echo "TEST_NAME=$TEST_NAME"

          if [ -n "$TEST_NAME" ]; then
            mvn -B clean test \
              -Dtest="$TEST_NAME" \
              -Dbrowser="$BROWSER" \
              -Dheadless=true \
              -Dvisual.updateBaseline="$UPDATE_BASELINE" \
              -Dsurefire.rerunFailingTestsCount=2
          else
            mvn -B clean test \
              -Dgroups="$TAGS" \
              -DexcludedGroups="$EXCLUDED_TAGS" \
              -Dbrowser="$BROWSER" \
              -Dheadless=true \
              -Dvisual.updateBaseline="$UPDATE_BASELINE" \
              -Dsurefire.rerunFailingTestsCount=1
          fi

      - name: Generate Allure HTML report
        if: always()
        run: |
          mvn -B allure:report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ steps.meta.outputs.artifact_suffix }}
          path: target/surefire-reports/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ steps.meta.outputs.artifact_suffix }}
          path: target/allure-results/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-${{ steps.meta.outputs.artifact_suffix }}
          path: target/site/allure-maven/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots and other artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ steps.meta.outputs.artifact_suffix }}
          path: artifacts/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload visual baseline
        if: always() && github.event.inputs.update_baseline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline-${{ steps.meta.outputs.artifact_suffix }}
          path: src/test/resources/visual-baseline/**
          if-no-files-found: warn
          retention-days: 7